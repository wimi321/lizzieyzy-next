name: Build macOS amd64 Release

on:
  workflow_dispatch:
    inputs:
      date_tag:
        description: Release date tag, for example 2026-03-24
        required: true
        default: 2026-03-24
      release_tag:
        description: Existing GitHub release tag to upload into
        required: true
        default: 2.5.3-next-2026-03-24.2

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install build tools
        run: |
          brew update
          brew install maven katago

      - name: Generate app icons
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pillow
          python3 scripts/generate_app_icons.py

      - name: Build shaded jar
        run: mvn -DskipTests package

      - name: Prepare bundled KataGo assets
        env:
          HTTPS_PROXY: ""
          HTTP_PROXY: ""
          ALL_PROXY: ""
          MODEL_NAME: kata1-zhizi-b28c512nbt-muonfd2.bin.gz
          MODEL_URL: https://katagotraining.org/media/games/kata1/kata1-zhizi-b28c512nbt-muonfd2.bin.gz
        run: |
          set -euo pipefail
          mkdir -p .cache/katago
          MODEL_SOURCE="$PWD/.cache/katago/$MODEL_NAME"
          curl -fL --retry 5 --retry-all-errors -o "$MODEL_SOURCE" "$MODEL_URL"
          PREFERRED_MODEL_NAME="$MODEL_NAME" MODEL_SOURCE="$MODEL_SOURCE" ./scripts/prepare_bundled_katago.sh

      - name: Build macOS amd64 package
        run: ./scripts/package_macos_dmg.sh "${{ inputs.date_tag }}" 2.5.3 target/lizzie-yzy2.5.3-shaded.jar

      - name: Validate public macOS amd64 assets
        run: bash ./scripts/validate_release_assets.sh mac-amd64 dist/release "${{ inputs.date_tag }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-amd64-with-katago
          path: |
            dist/release/*mac-amd64.with-katago.dmg

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/release/*mac-amd64.with-katago.dmg \
            --repo "${{ github.repository }}" \
            --clobber
