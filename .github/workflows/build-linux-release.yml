name: Build Linux Release

on:
  workflow_dispatch:
    inputs:
      date_tag:
        description: Release date tag, for example 2026-03-24
        required: true
        default: 2026-05-04
      release_tag:
        description: Existing GitHub release tag to upload into
        required: true
        default: next-2026-05-04.1

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y maven zip unzip curl

      - name: Generate app icons
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pillow
          python3 scripts/generate_app_icons.py

      - name: Build shaded jar
        run: mvn -DskipTests package

      - name: Prepare bundled KataGo assets
        env:
          MODEL_NAME: kata1-zhizi-b28c512nbt-muonfd2.bin.gz
          MODEL_URL: https://media.katagotraining.org/uploaded/networks/models/kata1/kata1-zhizi-b28c512nbt-muonfd2.bin.gz
        run: |
          set -euo pipefail
          mkdir -p .cache/katago
          MODEL_SOURCE="$PWD/.cache/katago/$MODEL_NAME"
          curl -fL --retry 5 --retry-all-errors -o "$MODEL_SOURCE" "$MODEL_URL"
          PREFERRED_MODEL_NAME="$MODEL_NAME" MODEL_SOURCE="$MODEL_SOURCE" ./scripts/prepare_bundled_katago.sh

      - name: Build Linux package
        run: ./scripts/package_release.sh "${{ inputs.date_tag }}" target/lizzie-yzy2.5.3-shaded.jar "${{ inputs.release_tag }}"

      - name: Audit Linux display version
        run: |
          for flavor in with-katago opencl nvidia; do
            grep -q -- "-Dlizzie.next.version=\"${{ inputs.release_tag }}\"" \
              "dist/stage/${{ inputs.date_tag }}-linux64.${flavor}/start-linux64.sh"
          done
          grep -q -- "Release display version: ${{ inputs.release_tag }}" \
            "dist/release-meta/${{ inputs.date_tag }}-linux64-install.txt"

      - name: Audit Linux KataGo backends
        run: |
          set -euo pipefail
          declare -A expected_backend=(
            [with-katago]=cpu
            [opencl]=opencl
            [nvidia]=nvidia
          )
          for flavor in with-katago opencl nvidia; do
            engine_dir="dist/stage/${{ inputs.date_tag }}-linux64.${flavor}/Lizzieyzy/engines/katago/linux-x64"
            test -x "$engine_dir/katago"
            test -f "$engine_dir/lizzieyzy-next-engine-backend.txt"
            grep -qx "${expected_backend[$flavor]}" "$engine_dir/lizzieyzy-next-engine-backend.txt"
          done
          grep -Eq "Linux bundle: katago-v.*-eigen-linux-x64.zip" "dist/stage/${{ inputs.date_tag }}-linux64.with-katago/Lizzieyzy/engines/katago/VERSION.txt"
          grep -Eq "Linux OpenCL bundle: katago-v.*-opencl-linux-x64.zip" "dist/stage/${{ inputs.date_tag }}-linux64.opencl/Lizzieyzy/engines/katago/VERSION.txt"
          grep -Eq "Linux NVIDIA bundle: katago-v.*-cuda.*-linux-x64.zip" "dist/stage/${{ inputs.date_tag }}-linux64.nvidia/Lizzieyzy/engines/katago/VERSION.txt"
          cpu_version="$(dist/stage/${{ inputs.date_tag }}-linux64.with-katago/Lizzieyzy/engines/katago/linux-x64/katago version 2>&1)"
          echo "$cpu_version"
          echo "$cpu_version" | grep -q "Using Eigen"

      - name: Validate public Linux assets
        run: bash ./scripts/validate_release_assets.sh linux dist/release "${{ inputs.date_tag }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-release
          path: |
            dist/release/*linux64*.zip

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/release/*linux64*.zip \
            --repo "${{ github.repository }}" \
            --clobber
