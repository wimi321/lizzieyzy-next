name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      date_tag:
        description: Release date tag, for example 2026-03-24
        required: true
        default: 2026-05-06
      release_tag:
        description: Existing GitHub release tag to upload into
        required: true
        default: next-2026-05-06.1
      release_prerelease:
        description: Optional explicit pre-release state for draft release publishing
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate app icons
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          python scripts/generate_app_icons.py

      - name: Install packaging tools
        shell: powershell
        run: |
          choco install wixtoolset --no-progress -y
          choco install 7zip --no-progress -y

      - name: Build shaded jar
        shell: bash
        run: mvn -DskipTests package

      - name: Prepare bundled KataGo assets
        shell: bash
        env:
          MODEL_NAME: kata1-zhizi-b28c512nbt-muonfd2.bin.gz
          MODEL_URL: https://media.katagotraining.org/uploaded/networks/models/kata1/kata1-zhizi-b28c512nbt-muonfd2.bin.gz
        run: |
          set -euo pipefail
          mkdir -p .cache/katago
          MODEL_SOURCE="$PWD/.cache/katago/$MODEL_NAME"
          curl -fL --retry 5 --retry-all-errors -o "$MODEL_SOURCE" "$MODEL_URL"
          PREFERRED_MODEL_NAME="$MODEL_NAME" MODEL_SOURCE="$MODEL_SOURCE" ./scripts/prepare_bundled_katago.sh

      - name: Build Windows installer and portable package
        timeout-minutes: 300
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_PRERELEASE: ${{ inputs.release_prerelease }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^next-[0-9]{4}-[0-9]{2}-[0-9]{2}\.[1-9][0-9]*$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          release_prerelease="$RELEASE_PRERELEASE"
          if [[ -z "$release_prerelease" ]]; then
            # Draft releases are intentionally omitted by the releases/tags endpoint.
            # The authenticated release listing includes both drafts and public releases.
            release_prerelease="$(
              gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" |
                jq -r --arg tag "$RELEASE_TAG" \
                  'first(.[] | select(.tag_name == $tag)) | .prerelease'
            )"
          fi
          if [[ "$release_prerelease" != "true" && "$release_prerelease" != "false" ]]; then
            echo "Unable to determine pre-release state for $RELEASE_TAG" >&2
            exit 1
          fi

          serial="$RELEASE_TAG"
          serial="${serial##*.}"
          if [[ ! "$serial" =~ ^[0-9]+$ ]]; then
            serial="${GITHUB_RUN_ATTEMPT:-0}"
          fi
          WINDOWS_BUILD_SERIAL="$serial" LIZZIE_RELEASE_PRERELEASE="$release_prerelease" \
            ./scripts/package_windows_exe.sh "${{ inputs.date_tag }}" 1.0.0 target/lizzie-yzy2.5.3-shaded.jar "$RELEASE_TAG"

      - name: Validate public Windows assets
        shell: bash
        run: bash ./scripts/validate_release_assets.sh windows dist/release "${{ inputs.date_tag }}"

      - name: Audit Windows bundle UX checkpoints
        shell: bash
        run: |
          set -euo pipefail
          note_file="dist/release-meta/${{ inputs.date_tag }}-windows64-install.txt"
          test -f "$note_file"
          grep -q "Release display version: ${{ inputs.release_tag }}" "$note_file"
          grep -q "Smart Optimize" "$note_file"
          grep -q "first launch should work offline" "$note_file"
          grep -q "qiyi71w/readboard v3.0.6" "$note_file"
          grep -q "JCEF browser runtime" "$note_file"
          grep -q "RTX 5070/5080/5090" "$note_file"
          test -f "dist/windows/input-with-katago/engines/katago/windows-x64/katago.exe"
          test -f "dist/windows/input-with-katago/PROJECT_INFO.txt"
          test -f "dist/windows/input-with-katago/readboard/readboard.exe"
          test -f "dist/windows/input-with-katago/readboard/lizzieyzy-next-readboard-manifest.txt"
          test -f "dist/windows/input-with-katago/jcef-bundle/build_meta.json"
          test -f "dist/windows/input-with-katago/jcef-bundle/install.lock"
          test -f "dist/windows/input-with-katago/jcef-bundle/libcef.dll"
          test -f "dist/windows/input-with-katago/jcef-bundle/lizzieyzy-next-jcef-manifest.txt"
          grep -qx "release-tag=jcef-99c2f7a+cef-127.3.1+g6cbb30e+chromium-127.0.6533.100" "dist/windows/input-with-katago/jcef-bundle/lizzieyzy-next-jcef-manifest.txt"
          grep -qx "platform=windows-amd64" "dist/windows/input-with-katago/jcef-bundle/lizzieyzy-next-jcef-manifest.txt"
          grep -qx "sha256=6d0466b9d5a2c4607a8a9eded1b5b9f77ca4514eadb68a1333b19053a462ceac" "dist/windows/input-with-katago/jcef-bundle/lizzieyzy-next-jcef-manifest.txt"
          grep -qx "release-tag=v3.0.6" "dist/windows/input-with-katago/readboard/lizzieyzy-next-readboard-manifest.txt"
          grep -qx "asset-name=readboard-github-release-v3.0.6.zip" "dist/windows/input-with-katago/readboard/lizzieyzy-next-readboard-manifest.txt"
          grep -qx "sha256=1ba4c265f560cd988be24f4ea0eeb29516883f42ece477bd32b72f8bccf6565d" "dist/windows/input-with-katago/readboard/lizzieyzy-next-readboard-manifest.txt"
          grep -Eq '^Windows bundle: katago-v[0-9.]+-eigen-windows-x64\.zip$' "dist/windows/input-with-katago/engines/katago/VERSION.txt"
          test -f "dist/windows/input-opencl/engines/katago/windows-x64/katago.exe"
          test -f "dist/windows/input-opencl/PROJECT_INFO.txt"
          test -f "dist/windows/input-opencl/readboard/readboard.exe"
          test -f "dist/windows/input-opencl/readboard/lizzieyzy-next-readboard-manifest.txt"
          grep -Eq '^Windows OpenCL bundle: katago-v[0-9.]+-opencl-windows-x64\.zip$' "dist/windows/input-opencl/engines/katago/VERSION.txt"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/LizzieYzy Next.exe"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/app/PROJECT_INFO.txt"
          grep -q "java-options=-Dlizzie.next.version=${{ inputs.release_tag }}" "dist/windows/app-image-with-katago/LizzieYzy Next/app/LizzieYzy Next.cfg"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/app/readboard/readboard.exe"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/app/readboard/lizzieyzy-next-readboard-manifest.txt"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/app/jcef-bundle/build_meta.json"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/app/jcef-bundle/install.lock"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/app/jcef-bundle/libcef.dll"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/app/jcef-bundle/lizzieyzy-next-jcef-manifest.txt"
          test -f "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/LizzieYzy Next OpenCL.exe"
          test -f "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/app/PROJECT_INFO.txt"
          grep -q "java-options=-Dlizzie.next.version=${{ inputs.release_tag }}" "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/app/LizzieYzy Next OpenCL.cfg"
          test -f "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/app/readboard/readboard.exe"
          test -f "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/runtime/bin/java.exe"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/LizzieYzy Next NVIDIA.exe"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/PROJECT_INFO.txt"
          grep -q "java-options=-Dlizzie.next.version=${{ inputs.release_tag }}" "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/LizzieYzy Next NVIDIA.cfg"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/readboard/readboard.exe"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/runtime/bin/java.exe"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/katago.exe"
          test -f "dist/windows/input-nvidia/PROJECT_INFO.txt"
          test -f "dist/windows/input-nvidia/readboard/readboard.exe"
          test -f "dist/windows/input-nvidia/readboard/lizzieyzy-next-readboard-manifest.txt"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cudart64_12.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cublas64_12.dll"
          test -f "dist/windows/app-image-without.engine/LizzieYzy Next/LizzieYzy Next.exe"
          test -f "dist/windows/app-image-without.engine/LizzieYzy Next/app/PROJECT_INFO.txt"
          grep -q "java-options=-Dlizzie.next.version=${{ inputs.release_tag }}" "dist/windows/app-image-without.engine/LizzieYzy Next/app/LizzieYzy Next.cfg"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cublasLt64_12.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cudnn64_8.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/libz.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/lizzieyzy-next-nvidia-runtime-manifest.txt"
          find "dist/windows/input-nvidia/engines/katago/windows-x64" -maxdepth 1 -type f -name 'nvJitLink*.dll' | grep -q .
          grep -qx "nvidia" "dist/windows/input-nvidia/engines/katago/windows-x64/lizzieyzy-next-engine-backend.txt"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cudart64_12.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cublas64_12.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cublasLt64_12.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cudnn64_8.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/libz.dll"
          find "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64" -maxdepth 1 -type f -name 'nvJitLink*.dll' | grep -q .
          test -f "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/LizzieYzy Next NVIDIA 50 CUDA.exe"
          test -f "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/PROJECT_INFO.txt"
          grep -q "java-options=-Dlizzie.next.version=${{ inputs.release_tag }}" "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/LizzieYzy Next NVIDIA 50 CUDA.cfg"
          test -f "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/readboard/readboard.exe"
          test -f "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/runtime/bin/java.exe"
          test -f "dist/windows/input-nvidia50.cuda/engines/katago/windows-x64/katago.exe"
          test -f "dist/windows/input-nvidia50.cuda/PROJECT_INFO.txt"
          test -f "dist/windows/input-nvidia50.cuda/readboard/readboard.exe"
          test -f "dist/windows/input-nvidia50.cuda/readboard/lizzieyzy-next-readboard-manifest.txt"
          test -f "dist/windows/input-nvidia50.cuda/engines/katago/windows-x64/cudart64_12.dll"
          test -f "dist/windows/input-nvidia50.cuda/engines/katago/windows-x64/cublas64_12.dll"
          test -f "dist/windows/input-nvidia50.cuda/engines/katago/windows-x64/cublasLt64_12.dll"
          test -f "dist/windows/input-nvidia50.cuda/engines/katago/windows-x64/cudnn64_9.dll"
          test -f "dist/windows/input-nvidia50.cuda/engines/katago/windows-x64/libz.dll"
          test -f "dist/windows/input-nvidia50.cuda/engines/katago/windows-x64/lizzieyzy-next-nvidia-runtime-manifest.txt"
          grep -q "Profile: cuda12.8-cudnn9" "dist/windows/input-nvidia50.cuda/engines/katago/windows-x64/lizzieyzy-next-nvidia-runtime-manifest.txt"
          find "dist/windows/input-nvidia50.cuda/engines/katago/windows-x64" -maxdepth 1 -type f -name 'nvJitLink*.dll' | grep -q .
          grep -qx "nvidia50-cuda" "dist/windows/input-nvidia50.cuda/engines/katago/windows-x64/lizzieyzy-next-engine-backend.txt"
          test -f "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/engines/katago/windows-x64/cudart64_12.dll"
          test -f "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/engines/katago/windows-x64/cublas64_12.dll"
          test -f "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/engines/katago/windows-x64/cublasLt64_12.dll"
          test -f "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/engines/katago/windows-x64/cudnn64_9.dll"
          test -f "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/engines/katago/windows-x64/libz.dll"
          find "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/engines/katago/windows-x64" -maxdepth 1 -type f -name 'nvJitLink*.dll' | grep -q .
          test -f "dist/release/${{ inputs.date_tag }}-windows64.nvidia.tensorrt.portable.7z.001"
          test -f "dist/release/${{ inputs.date_tag }}-windows64.nvidia.tensorrt.portable.README.txt"
          test -f "dist/release/${{ inputs.date_tag }}-windows64.nvidia.tensorrt.portable.manifest.json"
          test -f "dist/release/${{ inputs.date_tag }}-windows64.nvidia.tensorrt.portable.sha256.txt"
          grep -q "Advanced optional TensorRT split package" "dist/release/${{ inputs.date_tag }}-windows64.nvidia.tensorrt.portable.README.txt"
          grep -q '"engineBackend": "nvidia-tensorrt"' "dist/release/${{ inputs.date_tag }}-windows64.nvidia.tensorrt.portable.manifest.json"
          test -f "dist/windows/input-without.engine/PROJECT_INFO.txt"
          test -f "dist/windows/input-without.engine/readboard/readboard.exe"
          test -f "dist/windows/input-without.engine/readboard/lizzieyzy-next-readboard-manifest.txt"
          test -f "dist/windows/app-image-without.engine/LizzieYzy Next/app/PROJECT_INFO.txt"
          test -f "dist/windows/app-image-without.engine/LizzieYzy Next/app/readboard/readboard.exe"
          test -f "dist/windows/app-image-without.engine/LizzieYzy Next/runtime/bin/java.exe"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/runtime/bin/java.exe"
          shopt -s nullglob
          jcef_bundle_count=0
          for jcef_bundle in dist/windows/input-*/jcef-bundle dist/windows/app-image-*/*/app/jcef-bundle; do
            test -f "$jcef_bundle/build_meta.json"
            test -f "$jcef_bundle/install.lock"
            test -f "$jcef_bundle/libcef.dll"
            test -f "$jcef_bundle/jcef.dll"
            test -f "$jcef_bundle/jcef_helper.exe"
            test -f "$jcef_bundle/lizzieyzy-next-jcef-manifest.txt"
            grep -qx "release-tag=jcef-99c2f7a+cef-127.3.1+g6cbb30e+chromium-127.0.6533.100" "$jcef_bundle/lizzieyzy-next-jcef-manifest.txt"
            grep -qx "platform=windows-amd64" "$jcef_bundle/lizzieyzy-next-jcef-manifest.txt"
            jcef_bundle_count=$((jcef_bundle_count + 1))
          done
          if (( jcef_bundle_count < 2 )); then
            echo "Expected bundled JCEF runtime in Windows inputs and app images"
            exit 1
          fi
          for app_cfg in \
            "dist/windows/app-image-with-katago/LizzieYzy Next/app/LizzieYzy Next.cfg" \
            "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/app/LizzieYzy Next OpenCL.cfg" \
            "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/LizzieYzy Next NVIDIA.cfg" \
            "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/LizzieYzy Next NVIDIA 50 CUDA.cfg" \
            "dist/windows/app-image-without.engine/LizzieYzy Next/app/LizzieYzy Next.cfg"; do
            grep -q -- "java-options=-Xshare:auto" "$app_cfg"
            grep -q -- "java-options=-XX:InitialRAMPercentage=1.0" "$app_cfg"
            grep -q -- "java-options=-XX:MaxRAMPercentage=50.0" "$app_cfg"
            ! grep -q -- "java-options=-Xmx4096m" "$app_cfg"
            ! grep -q -- "SharedArchiveFile" "$app_cfg"
            if grep -qE 'sun\.java2d\.uiScale=1\.0|sun\.java2d\.uiScale\.enabled=false' "$app_cfg"; then
              echo "Windows package must not force Java UI scaling: $app_cfg"
              exit 1
            fi
          done
          test -f "dist/release-meta/${{ inputs.date_tag }}-windows64-runtime.json"
          grep -q '"optimized": true' "dist/release-meta/${{ inputs.date_tag }}-windows64-runtime.json"
          grep -q '"created": true' "dist/release-meta/${{ inputs.date_tag }}-windows64-runtime.json"
          for app_dir in \
            "dist/windows/app-image-with-katago/LizzieYzy Next" \
            "dist/windows/app-image-opencl/LizzieYzy Next OpenCL" \
            "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA" \
            "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA" \
            "dist/windows/app-image-without.engine/LizzieYzy Next"; do
            test ! -f "$app_dir/app/lizzieyzy-next-cds.jsa"
            test -f "$app_dir/runtime/bin/server/jvm.dll"
            test -f "$app_dir/runtime/bin/jabswitch.exe"
            test -f "$app_dir/runtime/bin/javaaccessbridge.dll"
            test -f "$app_dir/runtime/bin/windowsaccessbridge-64.dll"
            "$app_dir/runtime/bin/java.exe" --list-modules | grep -q '^jdk.accessibility@'
            "$app_dir/runtime/bin/java.exe" \
              -Xshare:auto \
              -XX:InitialRAMPercentage=1.0 \
              -XX:MaxRAMPercentage=50.0 \
              -version
          done
          for readboard_exe in \
            "dist/windows/input-with-katago/readboard/readboard.exe" \
            "dist/windows/input-opencl/readboard/readboard.exe" \
            "dist/windows/input-nvidia/readboard/readboard.exe" \
            "dist/windows/input-nvidia50.cuda/readboard/readboard.exe" \
            "dist/windows/input-without.engine/readboard/readboard.exe" \
            "dist/windows/app-image-with-katago/LizzieYzy Next/app/readboard/readboard.exe" \
            "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/app/readboard/readboard.exe" \
            "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/readboard/readboard.exe" \
            "dist/windows/app-image-nvidia50.cuda/LizzieYzy Next NVIDIA 50 CUDA/app/readboard/readboard.exe" \
            "dist/windows/app-image-without.engine/LizzieYzy Next/app/readboard/readboard.exe"; do
            grep -a -q 'level="asInvoker"' "$readboard_exe"
            if grep -a -q 'level="requireAdministrator"' "$readboard_exe"; then
              echo "readboard.exe must not request administrator privileges: $readboard_exe"
              exit 1
            fi
          done

      - name: Smoke test bundled Windows app images
        shell: powershell
        run: |
          $appExe = Join-Path $PWD "dist\windows\app-image-with-katago\LizzieYzy Next\LizzieYzy Next.exe"
          & "$PWD\scripts\windows_smoke_test.ps1" -AppExe $appExe -WaitSeconds 60 -ProbeBoardSync
          $nvidiaExe = Join-Path $PWD "dist\windows\app-image-nvidia\LizzieYzy Next NVIDIA\LizzieYzy Next NVIDIA.exe"
          & "$PWD\scripts\windows_smoke_test.ps1" `
            -AppExe $nvidiaExe `
            -WaitSeconds 30 `
            -HealthyProcessSeconds 8 `
            -PreserveConfig `
            -LauncherOnly `
            -OpenAutoSetup
          $launcherOnlyApps = @(
            "dist\windows\app-image-opencl\LizzieYzy Next OpenCL\LizzieYzy Next OpenCL.exe",
            "dist\windows\app-image-nvidia50.cuda\LizzieYzy Next NVIDIA 50 CUDA\LizzieYzy Next NVIDIA 50 CUDA.exe",
            "dist\windows\app-image-without.engine\LizzieYzy Next\LizzieYzy Next.exe"
          )
          foreach ($relativePath in $launcherOnlyApps) {
            $launcherExe = Join-Path $PWD $relativePath
            & "$PWD\scripts\windows_smoke_test.ps1" `
              -AppExe $launcherExe `
              -WaitSeconds 30 `
              -HealthyProcessSeconds 8 `
              -PreserveConfig `
              -LauncherOnly
          }

      - name: Summarize Windows package size audit
        if: always()
        shell: bash
        run: |
          audit="dist/release-meta/${{ inputs.date_tag }}-windows64-package-size-audit.md"
          if [[ -f "$audit" ]]; then
            cat "$audit" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/release/*windows64*.installer.exe \
            dist/release/*windows64*.portable.zip \
            dist/release/*windows64.core-update.zip \
            dist/release/lizzieyzy-next-update-manifest.json \
            dist/release/*windows64.nvidia.tensorrt.portable.7z.* \
            dist/release/*windows64.nvidia.tensorrt.portable.README.txt \
            dist/release/*windows64.nvidia.tensorrt.portable.manifest.json \
            dist/release/*windows64.nvidia.tensorrt.portable.sha256.txt \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Smoke test Windows upgrade install path
        timeout-minutes: 25
        continue-on-error: true
        shell: powershell
        run: |
          $inputDir = Join-Path $PWD "dist\windows\input-with-katago"
          $iconPath = Join-Path $PWD "packaging\icons\app-icon.ico"
          & "$PWD\scripts\windows_upgrade_smoke.ps1" `
            -InputDir $inputDir `
            -MainJar "lizzie-yzy2.5.3-shaded.jar" `
            -IconPath $iconPath `
