name: Build macOS arm64 Release

on:
  workflow_dispatch:
    inputs:
      date_tag:
        description: Release date tag, for example 2026-03-24
        required: true
        default: 2026-05-06
      release_tag:
        description: Existing GitHub release tag to upload into
        required: true
        default: next-2026-05-06.1

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install build tools
        run: |
          brew update
          brew install maven katago

      - name: Generate app icons
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pillow
          python3 scripts/generate_app_icons.py

      - name: Build shaded jar
        run: mvn -DskipTests package

      - name: Prepare bundled KataGo assets
        env:
          HTTPS_PROXY: ""
          HTTP_PROXY: ""
          ALL_PROXY: ""
          MODEL_NAME: kata1-zhizi-b28c512nbt-muonfd2.bin.gz
          MODEL_URL: https://media.katagotraining.org/uploaded/networks/models/kata1/kata1-zhizi-b28c512nbt-muonfd2.bin.gz
        run: |
          set -euo pipefail
          mkdir -p .cache/katago
          MODEL_SOURCE="$PWD/.cache/katago/$MODEL_NAME"
          curl -fL --retry 5 --retry-all-errors -o "$MODEL_SOURCE" "$MODEL_URL"
          PREFERRED_MODEL_NAME="$MODEL_NAME" MODEL_SOURCE="$MODEL_SOURCE" ./scripts/prepare_bundled_katago.sh

      - name: Build macOS arm64 package
        run: ./scripts/package_macos_dmg.sh "${{ inputs.date_tag }}" 1.0.0 target/lizzie-yzy2.5.3-shaded.jar "${{ inputs.release_tag }}"

      - name: Audit macOS arm64 display version
        run: |
          grep -q -- "java-options=-Dlizzie.next.version=${{ inputs.release_tag }}" \
            "dist/macos/app-image/LizzieYzy Next.app/Contents/app/LizzieYzy Next.cfg"
          grep -q -- "java-options=-Xshare:auto" \
            "dist/macos/app-image/LizzieYzy Next.app/Contents/app/LizzieYzy Next.cfg"
          for option in \
            "--add-exports=java.desktop/sun.awt=ALL-UNNAMED" \
            "--add-exports=java.desktop/sun.lwawt=ALL-UNNAMED" \
            "--add-exports=java.desktop/sun.lwawt.macosx=ALL-UNNAMED"; do
            grep -Fqx "java-options=$option" \
              "dist/macos/app-image/LizzieYzy Next.app/Contents/app/LizzieYzy Next.cfg"
          done
          ! grep -q -- "SharedArchiveFile" \
            "dist/macos/app-image/LizzieYzy Next.app/Contents/app/LizzieYzy Next.cfg"
          test ! -f "dist/macos/app-image/LizzieYzy Next.app/Contents/app/lizzieyzy-next-cds.jsa"
          grep -q -- "Release display version: ${{ inputs.release_tag }}" \
            "dist/release-meta/${{ inputs.date_tag }}-mac-apple-silicon-install.txt"
          test -f "dist/release-meta/${{ inputs.date_tag }}-mac-apple-silicon-runtime.json"
          grep -q '"optimized": true' "dist/release-meta/${{ inputs.date_tag }}-mac-apple-silicon-runtime.json"
          grep -q '"created": true' "dist/release-meta/${{ inputs.date_tag }}-mac-apple-silicon-runtime.json"
          jcef="dist/macos/app-image/LizzieYzy Next.app/Contents/app/jcef-bundle"
          test -f "$jcef/build_meta.json"
          test -f "$jcef/install.lock"
          test -f "$jcef/libjcef.dylib"
          test -f "$jcef/Chromium Embedded Framework.framework/Chromium Embedded Framework"
          test -f "$jcef/jcef Helper.app/Contents/MacOS/jcef Helper"
          grep -qx "release-tag=jcef-99c2f7a+cef-127.3.1+g6cbb30e+chromium-127.0.6533.100" \
            "$jcef/lizzieyzy-next-jcef-manifest.txt"
          grep -qx "platform=macosx-arm64" "$jcef/lizzieyzy-next-jcef-manifest.txt"
          grep -qx "sha256=1746a503e38614ea3e4fe7986e22443ab48a3a245ba1f4b17575aaccab5e7994" \
            "$jcef/lizzieyzy-next-jcef-manifest.txt"

      - name: Sign and notarize (if Apple Developer credentials configured)
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: bash ./scripts/sign_macos_release.sh dist/release mac-arm64

      - name: Validate public macOS arm64 assets
        run: bash ./scripts/validate_release_assets.sh mac-arm64 dist/release "${{ inputs.date_tag }}"

      - name: Summarize macOS arm64 package size audit
        if: always()
        run: |
          audit="dist/release-meta/${{ inputs.date_tag }}-mac-apple-silicon-package-size-audit.md"
          if [[ -f "$audit" ]]; then
            cat "$audit" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-arm64-with-katago
          path: |
            dist/release/*mac-apple-silicon.with-katago.dmg
            dist/release-meta/*mac-apple-silicon-*.json
            dist/release-meta/*mac-apple-silicon-*.md

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/release/*mac-apple-silicon.with-katago.dmg \
            --repo "${{ github.repository }}" \
            --clobber
