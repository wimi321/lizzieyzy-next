AutoSetup.accelerationTensorRtHint=TensorRT는 NVIDIA용 고속 KataGo 백엔드입니다. 감지된 GPU에 따라 설치 권장 여부를 안내합니다. RTX 20/30/40/50에 권장하며 RTX 50은 주요 실험 대상입니다. 다운로드는 중단 후 이어받을 수 있습니다. 설치 후 첫 실행에서는 최적화 캐시 생성에 몇 분이 걸릴 수 있습니다. 실패하면 CUDA/OpenCL로 돌아가세요.
