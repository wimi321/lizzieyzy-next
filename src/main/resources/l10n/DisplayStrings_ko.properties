AdvanceTimeSettings.describe=<html>고급 시간 설정을 사용하면 사용자가 명령으로 엔진의 시간 설정을 제어할 수 있습니다. 이 설정을 사용하면 다른 시간 설정은 비활성화됩니다.<br />현재 두 가지 종류의 명령이 지원됩니다:<br />1.time_settings<br />    표준 GTP 명령, 형식: time_settings a b c,a는 유지 시간(초),b는 보요요미 시간(초),c 각 뵤요미에서 플레이해야 하는 이동 횟수입니다.<br />2.kata-time_settings<br />    KataGo의 명령, 참조:<a color="blue" href="https://github.com/lightvector/KataGo/blob/master/docs/GTP_Extensions.md"> 여기</a></html>
