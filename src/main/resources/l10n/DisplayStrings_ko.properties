AutoSetup.benchmarkHint=스마트 벤치마크는 KataGo의 공식 벤치마크를 실행하고 다양한 스레드 수를 테스트하며 이 컴퓨터에 권장되는 스레드 설정을 저장합니다. 일반적으로 2~10분 정도 소요됩니다. 컴퓨터 속도가 느리거나 모델이 크면 시간이 더 오래 걸릴 수 있습니다. 벤치마킹 중에는 현재 분석이 일시 중지되며 언제든지 중지할 수 있습니다.
