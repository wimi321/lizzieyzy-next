AutoSetup.navAcceleration=NVIDIA GPU 高速化
AutoSetup.navBenchmark=スマート速度最適化
AutoSetup.overviewTitle=ステータスの概要
AutoSetup.overviewSubtitle=設定を適用する前に、検出されたエンジン、使用中のウェイト、モデル、設定ファイルを確認してください。
AutoSetup.weightsTitle=ウェイト管理
AutoSetup.weightsSubtitle=ダウンロードしたウェイトを個別のエンジンとして追加すると、異なるモデル同士で対局できます。
AutoSetup.accelerationTitle=NVIDIA GPU 高速化コンポーネント
AutoSetup.accelerationSubtitle=バンドルされている NVIDIA ランタイムを確認し、必要に応じて RTX 20/30/40/50 ユーザー向けに TensorRT をインストールします。
AutoSetup.accelerationTensorRtHint=TensorRT は NVIDIA 向けの高速 KataGo バックエンドです。検出した GPU に応じてインストールの適否を案内します。RTX 20/30/40/50 に推奨し、RTX 50 は重点的な実験対象です。ダウンロードは中断後も再開できます。初回起動では最適化キャッシュの生成に数分かかることがあります。失敗した場合は CUDA/OpenCL に戻してください。
AutoSetup.benchmarkTitle=スマート計算速度向上
AutoSetup.benchmarkSubtitle=通常は 2 ～ 10 分程度かかります。このコンピュータに最適な KataGo スレッド数が選択されます。
AutoSetup.benchmarkAbout=について
AutoSetup.benchmarkHint=スマート ベンチマークは、KataGo の公式ベンチマークを実行し、さまざまなスレッド数をテストし、このコンピューターに推奨されるスレッド設定を保存します。通常は 2 ～ 10 分かかります。遅いコンピューターや大きなモデルではさらに時間がかかる場合があります。現在の分析はベンチマーク中は一時停止され、いつでも停止できます。
