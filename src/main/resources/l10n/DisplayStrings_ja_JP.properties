AutoSetup.title=KataGo 自動セットアップ
AutoSetup.description=ローカルの KataGo 本体、設定ファイル、ウェイトを自動検出し、すぐに使えるエンジン設定を作成します。\nウェイトがない場合は、ここから推奨公式モデルをダウンロードできます。
AutoSetup.expertMode=ガイド付きセットアップ
AutoSetup.expertHeader=KataGo の設定は、エンジン、ウェイト、スマート速度最適化、NVIDIA GPU 高速化に分かれています。
AutoSetup.expertSubtitle=まず「概要」を確認してください。モデルが必要な場合は「ウェイト」からダウンロードできます。
AutoSetup.sidebarTitle=セットアップセクション
AutoSetup.sidebarHint=「ウェイト」でモデルをダウンロードまたは取り込み、ダウンロード済みウェイトから追加します。
