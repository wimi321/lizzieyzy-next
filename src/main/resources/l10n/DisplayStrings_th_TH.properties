AdvanceTimeSettings.describe=<html>การตั้งค่าเวลาล่วงหน้าอนุญาตให้ผู้ใช้ควบคุมการตั้งค่าเวลาของเครื่องยนต์ตามคำสั่ง หากใช้การตั้งค่านี้ การตั้งค่าเวลาอื่นๆ จะถูกปิดใช้งาน<br />ปัจจุบันรองรับคำสั่งสองประเภท:<br />1.time_settings<br />    มาตรฐาน GTP คำสั่ง รูปแบบ: time_settings a b c,a คือรักษาเวลา (วินาที),b คือเวลาโบโยมิ (วินาที),c คือตัวเลข ของการเคลื่อนไหวในแต่ละ Byoyomi ควรเล่น<br />2.kata-time_settings<br />    KataGo's command,อ้างอิง:<a color="blue" href="https://github.com/lightvector/KataGo/blob/master/docs/GTP_Extensions.md"> ที่นี่</a></html>
